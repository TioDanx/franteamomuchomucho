<body class="bg-surface text-on-surface font-body selection:bg-primary-container/30">
<div class="film-grain"></div>
<!-- Hero Section (Top 38%) -->
<header class="relative h-[335px] w-full overflow-hidden rounded-b-[24px]">
<img alt="Vibrant night event with soft lighting" class="absolute inset-0 w-full h-full object-cover" data-alt="Elegant candlelit dinner with rose petals and warm ambiance" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDE8_pDI2q9VkQxSQfWbXvwMVLUzviDnlFG2VHNJXyZ2a1iwtW-Du56j4Ns_gcGg1yTXZK6P4NzrG0d57XfxPDEfzYMvSWXnFhCzRwYIpfkV_WocnuVILYjCdIv6w_jC9tGAJwyykeFsrdXHbR94orGEKTkvHq7e6EyucLA_D70wkawfqBRuYwg6jrsq3dl0C2bBDD2oSiqmbsVAjHGYAqzJc7GP4QLwgbvRaC9LPgQtF6EgXb95fkZNm4jyRbcdl5iPEAO-ShN9yM"/>
<div class="absolute inset-0 bg-gradient-to-b from-surface/40 via-transparent to-surface"></div>
<!-- Top Overlay UI -->
<div class="absolute top-0 left-0 w-full flex justify-between items-center px-6 pt-12 z-10">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface/20 backdrop-blur-md text-white active:scale-95 duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="px-4 py-1.5 rounded-full bg-error-container text-on-error-container text-xs font-bold tracking-widest uppercase">
                Urgente
            </div>
</div>
<!-- Activity Name -->
<div class="absolute bottom-6 left-6 right-6 z-10">
<h1 class="font-serif text-4xl font-bold text-[#F5F5F5] leading-tight drop-shadow-lg">
                Cata de Vinos &amp; <br/>Atardecer Privado
            </h1>
</div>
</header>
<main class="px-6 -mt-4 relative z-20 pb-32 space-y-6">
<!-- Countdown Card -->
<section class="bg-primary-container/10 backdrop-blur-xl border border-primary/10 rounded-lg p-6 flex flex-col items-center justify-center text-center shadow-[0px_20px_40px_rgba(255,177,194,0.08)]">
<p class="text-primary text-xs font-bold uppercase tracking-[0.2em] mb-3">Falta para este plan</p>
<div class="flex items-baseline gap-4">
<div class="flex flex-col">
<span class="text-3xl font-serif text-primary">3<span class="text-lg ml-0.5">d</span></span>
</div>
<div class="flex flex-col">
<span class="text-3xl font-serif text-primary">14<span class="text-lg ml-0.5">h</span></span>
</div>
<div class="flex flex-col">
<span class="text-3xl font-serif text-primary">22<span class="text-lg ml-0.5">m</span></span>
</div>
</div>
</section>
<!-- Info Grid (Bento Style) -->
<div class="grid grid-cols-1 gap-4">
<!-- Row: Fecha -->
<div class="flex items-center p-4 rounded-lg bg-surface-container-low group hover:bg-surface-container transition-colors duration-300">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-primary-fixed mr-4">
<span class="material-symbols-outlined">calendar_today</span>
</div>
<div class="flex-1">
<p class="text-[10px] uppercase tracking-widest text-outline font-bold mb-0.5">Fecha</p>
<p class="text-on-surface font-medium">Sábado, 24 de Octubre</p>
</div>
</div>
<!-- Row: Hora -->
<div class="flex items-center p-4 rounded-lg bg-surface-container-low group hover:bg-surface-container transition-colors duration-300">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-primary-fixed mr-4">
<span class="material-symbols-outlined">schedule</span>
</div>
<div class="flex-1">
<p class="text-[10px] uppercase tracking-widest text-outline font-bold mb-0.5">Hora</p>
<p class="text-on-surface font-medium">18:30 — Sunset Session</p>
</div>
</div>
<!-- Row: Lugar -->
<div class="flex items-center p-4 rounded-lg bg-surface-container-low group hover:bg-surface-container transition-colors duration-300">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-primary-fixed mr-4">
<span class="material-symbols-outlined">location_on</span>
</div>
<div class="flex-1">
<p class="text-[10px] uppercase tracking-widest text-outline font-bold mb-0.5">Lugar</p>
<p class="text-on-surface font-medium">Viñedo Luna Roja, Valle de Guadalupe</p>
</div>
</div>
</div>
<!-- Secondary Action Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-4 rounded-full border border-secondary/20 text-secondary font-bold text-sm hover:bg-secondary/5 transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined text-lg">map</span>
                Ver en Maps
            </button>
<button class="flex items-center justify-center gap-2 py-4 rounded-full bg-gradient-to-r from-secondary/80 to-secondary text-on-secondary font-bold text-sm shadow-lg shadow-secondary/10 hover:brightness-110 transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined text-lg">event</span>
                Al calendario
            </button>
</div>
</main>
<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full px-6 pb-8 pt-4 bg-gradient-to-t from-surface via-surface/95 to-transparent z-50">
<button class="w-full py-5 rounded-full bg-on-primary-fixed-variant text-secondary font-bold tracking-widest uppercase text-sm flex items-center justify-center gap-3 shadow-[0px_-10px_30px_rgba(22,17,28,0.5)] active:scale-[0.98] transition-transform duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            Completar actividad
        </button>
</div>
<!-- Shared Navigation Shell - Suppressed for Task-Focused Activity Detail -->
<!-- (Per "Semantic Shell" Mandate: Navigation hidden to prioritize the Content Canvas) -->
