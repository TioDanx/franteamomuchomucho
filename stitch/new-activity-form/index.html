<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&amp;family=DM+Sans:wght@400;500;700&amp;family=Manrope:wght@400;500;700&amp;family=Noto+Serif:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        darkMode: "class",

          extend: {

              "primary-fixed": "#ffd9df",

              "on-background": "#eadfee",
              "inverse-on-surface": "#342e39",
              "tertiary-fixed-dim": "#d2bdf7",
              "on-tertiary": "#382757",
              "on-primary-container": "#ffd9df",
              "tertiary-fixed": "#ebddff",
              "tertiary-container": "#6d5c8f",
              "secondary-container": "#755400",
              "inverse-surface": "#eadfee",
              "surface-container-highest": "#39323e",
              "outline": "#a8898e",
              "on-surface": "#eadfee",
              "on-primary-fixed-variant": "#8f003f",
              "error-container": "#93000a",
              "on-secondary-fixed": "#271900",
              "error": "#ffb4ab",
              "primary-container": "#c2185b",
              "background": "#16111c",
              "on-surface-variant": "#e1bec4",
              "on-secondary": "#412d00",
              "surface-tint": "#ffb1c2",
              "secondary-fixed": "#ffdea6",
              "on-primary": "#66002b",
              "primary": "#ffb1c2",
              "surface-bright": "#3d3742",
              "on-tertiary-container": "#ebddff",
              "inverse-primary": "#b90c55",
              "on-secondary-container": "#f9ca71",
              "surface-container-lowest": "#110c16",
              "surface-container-low": "#1f1924",
              "secondary-fixed-dim": "#eec068",
              "on-secondary-fixed-variant": "#5d4200",
              "surface-container-high": "#2e2833",
              "secondary": "#eec068",
              "surface-container": "#231d28",
              "on-primary-fixed": "#3f0018",
              "primary-fixed-dim": "#ffb1c2",
              "on-error": "#690005",
              "tertiary": "#d2bdf7",
              "surface-dim": "#16111c"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "serif": ["Cormorant Garamond"],
              "body": ["Manrope"],
              "label": ["Manrope"],
              "sans": ["DM Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-dashed {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='24' ry='24' stroke='%23C2185B' stroke-width='2' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
            border-radius: 24px;
        }
        .glass-sheet {
            background: rgba(30, 21, 48, 0.95);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen selection:bg-primary/30">
<!-- Top Navigation Bar (Mocked background for context) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#16111C]/60 backdrop-blur-xl">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">arrow_back</span>
<h1 class="font-serif italic text-2xl text-secondary">Nuestros Planes</h1>
</div>
<span class="material-symbols-outlined text-outline">more_vert</span>
</header>
<!-- Main Content Canvas (Simulating the background list) -->
<main class="pt-24 pb-32 px-6">
<div class="space-y-8 opacity-40">
<div class="h-64 w-full rounded-lg bg-surface-container overflow-hidden relative">
<img class="w-full h-full object-cover" data-alt="A beautifully curated table setting for dinner" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAVuU0VxGPr9S9GtYsqWbrsaYs_UDc-l9MGgB1KrxcFzrDpnJvPtapBrxKNJPXXwMyvqEfnSC5Af5emLSzYqiD3BD0K0oEwSgpJI8387thKS1ZJ9xIJVSOxZd_O9Go3YtvxdEpWUAizWs72DZo0fz7ZvHsL7Um9jmu0JlxbHsK2cDxNT9LIxjF0V7hkGhT_yAJlBwDKu8cSN3xEtNcSE8PEA5U-mWMIE_nw9_YGNn1kXx8YKOjLzaZ6dLAkd0wTPL9U8InRkKMlpMs"/>
<div class="absolute bottom-4 left-4">
<h2 class="font-serif text-3xl text-secondary italic">Cena en el Jardín</h2>
</div>
</div>
<div class="flex items-center gap-4 p-4 rounded-lg bg-surface-container-low">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container">auto_awesome</span>
</div>
<div>
<p class="text-on-surface font-bold text-sm">Reserva de restaurante</p>
<p class="text-outline text-xs">20:00 • Confirmado</p>
</div>
</div>
</div>
</main>
<!-- Bottom Sheet Overlay -->
<div class="fixed inset-0 bg-surface/80 backdrop-blur-sm z-[60]">
<!-- Bottom Sheet Container -->
<div class="fixed bottom-0 left-0 right-0 w-full glass-sheet rounded-t-[2rem] shadow-[0px_-10px_40px_rgba(22,17,28,0.6)] animate-in slide-in-from-bottom duration-500 overflow-hidden border-t border-outline-variant/15">
<!-- Handle -->
<div class="flex justify-center pt-4 pb-2">
<div class="w-12 h-1.5 bg-outline-variant/40 rounded-full"></div>
</div>
<div class="px-8 pb-10 pt-4">
<!-- Header -->
<div class="mb-8 text-center">
<h2 class="font-serif text-3xl text-primary-fixed tracking-tight">Nueva actividad</h2>
</div>
<!-- Form Content -->
<div class="space-y-8">
<!-- Photo Upload Area -->
<div class="relative w-full h-[160px] custom-dashed flex flex-col items-center justify-center group cursor-pointer hover:bg-primary/5 transition-colors">
<div class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center mb-3 shadow-lg">
<span class="material-symbols-outlined text-primary text-3xl">photo_camera</span>
</div>
<span class="font-sans text-xs uppercase tracking-[0.2em] font-bold text-outline">Subir imagen</span>
</div>
<!-- Activity Name Input -->
<div class="space-y-2">
<label class="font-sans text-[10px] uppercase tracking-widest font-bold text-secondary-fixed-dim px-1">Nombre del Plan</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl h-14 px-5 font-serif text-xl italic text-on-surface placeholder:text-outline-variant/60 focus:ring-2 focus:ring-primary/40 focus:outline-none transition-all" placeholder="¿Qué vamos a curar hoy?" type="text"/>
</div>
<!-- Importance Selector -->
<div class="space-y-4">
<p class="font-sans text-[10px] uppercase tracking-widest font-bold text-secondary-fixed-dim px-1 text-center">Nivel de Importancia</p>
<div class="flex justify-between items-center gap-3">
<button class="flex-1 py-3 px-2 rounded-full border border-emerald-500/20 bg-emerald-500/5 text-emerald-400 font-sans text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-2 hover:bg-emerald-500/20 transition-all">
<span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                                Baja
                            </button>
<button class="flex-1 py-3 px-2 rounded-full border border-amber-500/40 bg-amber-500/10 text-amber-300 font-sans text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-2 ring-1 ring-amber-500/50">
<span class="w-2 h-2 rounded-full bg-amber-500"></span>
                                Media
                            </button>
<button class="flex-1 py-3 px-2 rounded-full border border-red-500/20 bg-red-500/5 text-red-400 font-sans text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-2 hover:bg-red-500/20 transition-all">
<span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                                Urgente
                            </button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full h-16 rounded-full bg-gradient-to-r from-primary-container to-primary text-on-primary-container font-sans font-bold uppercase tracking-widest text-sm shadow-[0px_10px_30px_rgba(194,24,91,0.3)] active:scale-95 transition-transform flex items-center justify-center gap-3 group">
                            Guardar plan
                            <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">favorite</span>
</button>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full h-20 flex justify-around items-center px-4 pb-4 bg-[#1F1924]/80 backdrop-blur-2xl z-50 rounded-t-[2rem] border-t border-[#594045]/15 shadow-[0px_-10px_30px_rgba(22,17,28,0.5)]">
<div class="flex flex-col items-center justify-center text-secondary scale-110">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="font-sans text-[10px] uppercase tracking-widest font-bold mt-1">Curate</span>
</div>
<div class="flex flex-col items-center justify-center text-outline-variant opacity-60">
<span class="material-symbols-outlined">calendar_today</span>
<span class="font-sans text-[10px] uppercase tracking-widest font-bold mt-1">Calendar</span>
</div>
<div class="flex flex-col items-center justify-center text-outline-variant opacity-60">
<span class="material-symbols-outlined">favorite</span>
<span class="font-sans text-[10px] uppercase tracking-widest font-bold mt-1">Memories</span>
</div>
<div class="flex flex-col items-center justify-center text-outline-variant opacity-60">
<span class="material-symbols-outlined">person</span>
<span class="font-sans text-[10px] uppercase tracking-widest font-bold mt-1">Profile</span>
</div>
</nav>
</body></html>
